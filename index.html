<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="color-scheme" content="dark">
    <meta name="description" content="Mapa interativo da campanha de RPG Rio Invisível — Rio de Janeiro">
    <meta name="theme-color" content="#1a1a2e">
    <title>Rio Invisível — Mapa da Campanha</title>

    <link rel="icon" href="assets/favicon.ico">

    <!-- MapLibre -->
    <link href="https://unpkg.com/maplibre-gl@5.24.0/dist/maplibre-gl.css" rel="stylesheet">
    <!-- CSS do projeto -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="app">

        <div id="mapa"></div>

        <div id="ui">
            <div id="filtros">
                <button type="button" class="filtro-botao ativo" data-categoria="local">Locais</button>
                <button type="button" class="filtro-botao ativo" data-categoria="npc">NPCs</button>
                <button type="button" class="filtro-botao ativo" data-categoria="faccao">Facções</button>
            </div>
        </div>

        <div id="carregando">
            <p>Carregando o Rio Invisível...</p>
        </div>

        <!-- Lightbox: mostra a foto do popup em tamanho grande.
             Fica escondido (via CSS) até alguém clicar numa foto. -->
        <div id="lightbox">
            <img id="lightbox-imagem" src="" alt="">
        </div>

    </div>

    <!-- MapLibre -->
    <script src="https://unpkg.com/maplibre-gl@5.24.0/dist/maplibre-gl.js"></script>
    <!-- JavaScript do projeto -->
    <script src="script.js"></script>
</body>
</html>
